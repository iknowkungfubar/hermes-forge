name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install hatchling pytest pytest-asyncio pytest-cov httpx pydantic mcp
        pip install -e .
    - name: Run tests
      run: |
        python -m pytest tests/ -v --tb=short --cov=hermes_forge --cov-report=term-missing
    - name: Check imports
      run: |
        python -c "from hermes_forge import *; print('All exports OK')"
        python -c "from hermes_forge_plugin.plugin import HermesForgePlugin; print('Plugin import OK')"
